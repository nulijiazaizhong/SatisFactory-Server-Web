services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    environment:
      - PORT=3000
      - CORS_ORIGIN=*
      - SERVER_HOST=${SERVER_HOST}
      - SERVER_PORT=${SERVER_PORT:-7777}
      - SERVER_PASSWORD=${SERVER_PASSWORD}
      - WEBUI_PASSWORD=${WEBUI_PASSWORD}
    restart: unless-stopped